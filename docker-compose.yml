services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${HUGINN_DB_NAME:-huginn}
      POSTGRES_USER: ${HUGINN_DB_USER:-huginn}
      POSTGRES_PASSWORD: ${HUGINN_DB_PASSWORD:-huginn}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${HUGINN_DB_USER:-huginn} -d ${HUGINN_DB_NAME:-huginn}"]
      interval: 10s
      timeout: 5s
      retries: 10

  rsshub:
    image: ghcr.io/diygod/rsshub:chromium-bundled
    ports:
      - "${RSSHUB_PORT:-1200}:1200"
    environment:
      PORT: 1200
      ALLOW_ORIGIN: "*"
      NODE_ENV: production

  huginn:
    build:
      context: .
      dockerfile: docker/huginn/Dockerfile
    image: ai-news/huginn:local
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${HUGINN_PORT:-3000}:3000"
    environment:
      RAILS_ENV: production
      RAILS_SERVE_STATIC_FILES: "true"
      PORT: 3000
      DOMAIN: ${HUGINN_DOMAIN:-localhost:3000}
      FORCE_SSL: "false"
      APP_SECRET_TOKEN: ${HUGINN_APP_SECRET_TOKEN:-replace-me-with-random-string}
      INVITATION_CODE: ${HUGINN_INVITATION_CODE:-try-huginn}
      SKIP_INVITATION_CODE: "true"
      DATABASE_ADAPTER: postgresql
      DATABASE_NAME: ${HUGINN_DB_NAME:-huginn}
      DATABASE_USERNAME: ${HUGINN_DB_USER:-huginn}
      DATABASE_PASSWORD: ${HUGINN_DB_PASSWORD:-huginn}
      DATABASE_HOST: ${HUGINN_DB_HOST:-postgres}
      DATABASE_PORT: ${HUGINN_DB_PORT:-5432}
      DATABASE_POOL: 20
      IMPORT_DEFAULT_SCENARIO_FOR_ALL_USERS: "false"
    volumes:
      - huginn_data:/var/lib/huginn
    command: bash -lc "bundle exec rake db:create || true; bundle exec rake db:migrate; bundle exec foreman start"

volumes:
  postgres_data:
  huginn_data:
